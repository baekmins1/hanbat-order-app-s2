apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-api
  namespace: hanbat-baekmins1
  labels:
    app: order-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-api
  template:
    metadata:
      labels:
        app: order-api
    spec:
      containers:
        - name: order-api
          image: acrbsm11.azurecr.io/order-api:1a9546b
          ports:
            - containerPort: 8080
          env:
            - name: PAYMENT_API_URL
              value: "http://payment-api:8080"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
